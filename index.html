<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css boc modal</title>
    <style>
        .box {
            background-color: aqua;
        }

        *{
            margin: 0px;
            height: 0px;

        }

        .box1 {
            color: yellow;
            margin: 25px;
            padding: 10px;
            border: 2px solid black;
            height: 200px;
            box-sizing: border-box;
        }

        .box2 {
            color: red;
            margin: 25px;
            padding: 10px;
            border: 2px solid black;
            height: 200px;
            box-sizing: border-box;
        }
        }
    </style>
</head>

<body>

    <div class="box box1">i am a box</div>
    <div class="box box2">i am another box</div>


</body>

</html>
