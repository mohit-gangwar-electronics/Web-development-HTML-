<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form--lets learn it</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>form to apply for jee</h1>

    <div>
        <form action="post">
            <label for="username">enter your username</label>
            <input type="text" id="username" name="username" placeholder="enter your username">
        </form>
    </div>

    <div>
        <form action="post">
            <label for="age">enter your age</label>
            <input type="text" id="age" name="age" placeholder="enter your age">
        </form>
    </div>
        
    <div>
        <input type="radio" id="male" value="male" name="gender"  >
        <label for="male">male</label>

        <input type="radio" id="fe-male" value="fe-male" name="gender"  >
        <label for="fe-male">fe-male</label>

        <input type="radio" id="xyz" value="xyz" name="gender"  >
        <label for="xyz">xyz</label>

        <!-- name tag ka seen yhe hai ki bahut se radio button ko jode rakhna -->
        <!-- ager kisi ek me input tag or for tag ko alag alag ker du to to bo select hi nahi hoga or us point ker click kerne per select ho jayega   -->
        <!-- name sabhi me same hoga kya ki kyo ki hame ek baar me ek hi select kerna hai -->
    </div>

    <div>
        <input type="checkbox" name="click" id="click here" name="yes">
        <label for="click here">you real all term and condition</label>
        <br>
        <input type="checkbox" name="click" id="click here" name="yes">
        <label for="click here">i am also right</label>
        <br>
        <input type="checkbox" name="click" id="click here" name="yes">
        <label for="click here">never give up okkk</label>
        
        <!-- checkbox me name ko same rakhena per backend ko yhe pta chalta hai ki dono same type ke hai  -->
    </div>

    <div>
        <label for="comment">enter your comment</label>
        <br>
        <textarea name="comment" id="comment" rows="5" cols="50">enter your text..............</textarea>
    </div>

    <div>
        <select name="city">
            <option value="bareilly">bareilly</option>
            <option value="noida">noida</option>
            <option value="delhi">delhi</option>
        </select>
    </div>

    <div>
        <label for="city">enter your city</label>
        <input id="city" type="text" required placeholder="enter your city">
    </div>

    
</body>
</html>
